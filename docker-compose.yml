version: '3.8'

services:
  neo4j:
    image: neo4j:5.17-community
    container_name: moviefinder-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/moviefinder
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    container_name: moviefinder-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  neo4j_data:
  redis_data:

# Production profile — all secrets via environment variables
spring:
  neo4j:
    uri: ${NEO4J_URI}
    authentication:
      username: ${NEO4J_USERNAME}
      password: ${NEO4J_PASSWORD}
    pool:
      max-connection-lifetime: 30m       # recycle connections before they go stale
      connection-acquisition-timeout: 30s
      max-connection-pool-size: 50
      idle-time-before-connection-test: 1m  # test idle connections before reuse
      log-leaked-sessions: true

  data:
    redis:
      url: ${REDIS_URL}   # rediss://default:password@host:port
      ssl:
        enabled: true

server:
  port: 8080

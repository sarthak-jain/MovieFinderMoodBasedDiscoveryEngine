spring:
  application:
    name: moviefinder

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: moviefinder

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080

# TMDb API configuration
tmdb:
  api-key: ${TMDB_API_KEY:your-api-key-here}
  base-url: https://api.themoviedb.org/3
  image-base-url: https://image.tmdb.org/t/p
  rate-limit: 40  # requests per 10 seconds

# Application settings
moviefinder:
  cache:
    search-ttl: 300        # 5 minutes
    movie-detail-ttl: 86400 # 24 hours
    poster-ttl: 604800      # 7 days
  ingestion:
    batch-size: 500

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
